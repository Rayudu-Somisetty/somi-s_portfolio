<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="faviconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 16 16" to="360 16 16" dur="4s" repeatCount="indefinite"/>
  </defs>
  <rect x="4" y="4" width="24" height="24" rx="6" fill="url(#faviconGrad)" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
  </rect>
  <path d="M10 10 L22 10 L22 12 L14 12 L14 14 L20 14 L20 16 L14 16 L14 18 L22 18 L22 22 L10 22 L10 20 L16 20 L16 18 L10 18 L10 16 L16 16 L16 14 L10 14 Z" fill="white">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite"/>
  </path>
</svg>